<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
  <title>Abrigos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🏠 Abrigos Disponíveis</h1>
    
    <!-- Abrigos -->
    <section>
      <h2>Abrigos com Vagas</h2>
      <button onclick="carregarAbrigos()">🔄 Atualizar Abrigos</button>
      <div id="abrigos-list"></div>
    </section>

    <!-- Cadastrar Pessoas -->
     <h2>👤 Cadastrar Pessoa</h2>
   <form id="form-pessoa">
    <input **id="nome"** placeholder="Nome" required>
    <input **id="abrigos_id"** placeholder="Abrigo ID" type="number" required>
    <input **id="quantidade"** placeholder="Qtd Pessoas" type="number" value="1" required>
    <input **id="necessidade"** placeholder="Necessidade">
    <input **id="tempo"** placeholder="Tempo">
    <button type="submit">Cadastrar</button>
</form>

    <!-- Pessoas -->
    <section>
      <h2>Pessoas nos Abrigos</h2>
      <button onclick="carregarPessoas()">🔄 Pessoas</button>
      <div id="pessoas-list"></div>
      <div id="abrigos-list"></div>
    </section>
    
  </div>
  <script src="script.js"></script>
</body>
</html>
